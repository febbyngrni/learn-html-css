<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Credit Card UI Design</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="container">
        <div class="card">
            <div class="card-header">
                <div class="card-logo">
                    <img src="images/logo.png" alt="Logo Mastercard">
                    <h5>Mastercard</h5>
                </div>
                <img src="images/chip.png" alt="Chip">
            </div>

            <div class="card-details">
                <div class="card-info">
                    <h6>Card Number</h6>
                    <h5 class="number">8050 2030 3020 5040</h5>
                    <h5 class="name">Febby Anggraini</h5>
                </div>

                <div class="valid-date">
                    <h6>Valid Thru</h6>
                    <h5>05/28</h5>
                </div>
            </div>
        </div>
    </div>
</body>
</html>
