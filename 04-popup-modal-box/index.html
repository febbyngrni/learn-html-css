<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Alert Box</title>

    <!-- Font Awesome -->
    <script src="https://kit.fontawesome.com/700bd0dddc.js" crossorigin="anonymous"></script>

    <!-- CSS -->
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <input type="checkbox" id="check">
    <label for="check" class="show-button">Click me</label>

    <div class="background">
        <div class="alert-box">
            <div class="icon">
                <i class="fas fa-exclamation"></i>
            </div>
            <header>Confirm</header>
            <p>Are you sure want to permanently delete this photo?</p>
            <div class="btns">
                <label for="check">Yes, delete!</label>
                <label for="check">Cancel</label>
            </div>    
        </div>
    </div>
</body>
</html>
